<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="340" viewBox="0 0 1320 340" role="img" aria-labelledby="title desc">
  <title id="title">Locus 工作流图示</title>
  <desc id="desc">Locus 工作流图示：把分子图片转换成经过复查的 Extended-SMILES 提交文件。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#566274"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#233044" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#f7f9fc}.title{font:800 36px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.sub{font:500 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#667386}.card{fill:#fff;stroke:#dbe3ee;stroke-width:1.4;filter:url(#shadow)}.cap,.chip{fill:#fff}.chip{stroke:#d6e1ec;stroke-width:1.1}.step{font:800 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}.h{font:800 19px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.t{font:500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#5d6879}.tiny{font:500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#69778b}.chip-title{font:800 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.panel-title{font:800 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#172033}.arrow{stroke:#566274;stroke-width:2.7;fill:none;marker-end:url(#arrow);stroke-linecap:round}.line{stroke:#cbd6e4;stroke-width:1.3}
    </style>
  </defs>
  <rect class="bg" width="1320" height="640"/>
  <text class="title" x="56" y="62">Locus 工作流图示</text>
  <text class="sub" x="56" y="90">从分子图片生成经过复查的 Extended-SMILES 提交文件</text>

  <g transform="translate(56 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#2d7189"/>
    <circle cx="28" cy="34" r="16" fill="#2d7189"/><text class="step" x="24" y="39">1</text>
    <text class="h" x="22" y="70">输入图片</text>
    <text class="t" x="22" y="98">分子结构图</text>
    <text class="t" x="22" y="119">每张对应一行</text>
  </g>
  <path class="arrow" d="M225 208h34"/>

  <g transform="translate(268 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#586f3b"/>
    <circle cx="28" cy="34" r="16" fill="#586f3b"/><text class="step" x="24" y="39">2</text>
    <text class="h" x="22" y="70">预处理</text>
    <text class="t" x="22" y="98">裁剪、补边、放大</text>
    <text class="t" x="22" y="119">二值化/颜色清理</text>
  </g>
  <path class="arrow" d="M437 208h34"/>

  <g transform="translate(480 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#8a6b2e"/>
    <circle cx="28" cy="34" r="16" fill="#8a6b2e"/><text class="step" x="24" y="39">3</text>
    <text class="h" x="22" y="70">OCSR 识别</text>
    <text class="t" x="22" y="98">MolParser 主结果</text>
    <text class="t" x="22" y="119">可选本地模型</text>
  </g>
  <path class="arrow" d="M649 208h34"/>

  <g transform="translate(692 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#745c9b"/>
    <circle cx="28" cy="34" r="16" fill="#745c9b"/><text class="step" x="24" y="39">4</text>
    <text class="h" x="22" y="70">选择合并</text>
    <text class="t" x="22" y="98">候选排序</text>
    <text class="t" x="22" y="119">统一 E-SMILES</text>
  </g>
  <path class="arrow" d="M861 208h34"/>

  <g transform="translate(904 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#b65648"/>
    <circle cx="28" cy="34" r="16" fill="#b65648"/><text class="step" x="24" y="39">5</text>
    <text class="h" x="22" y="70">人工复查</text>
    <text class="t" x="22" y="98">RDKit 重画</text>
    <text class="t" x="22" y="119">人工修订覆盖</text>
  </g>
  <path class="arrow" d="M1073 208h34"/>

  <g transform="translate(1116 142)">
    <rect class="card" width="160" height="132" rx="15"/>
    <rect width="160" height="7" rx="3.5" fill="#2c7b75"/>
    <circle cx="28" cy="34" r="16" fill="#2c7b75"/><text class="step" x="24" y="39">6</text>
    <text class="h" x="22" y="70">导出</text>
    <text class="t" x="22" y="98">submission.csv</text>
    <text class="t" x="22" y="119">+ meta.md 压缩包</text>
  </g>
</svg>
